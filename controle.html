<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Dados - Supabase</title>
    <!-- Inclui a biblioteca Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
    font-family: 'Poppins', sans-serif; /* Uma fonte mais moderna e amigável */
    margin: 0;
    padding: 20px;
    background-color: #eef2f6; /* Um cinza azulado bem suave para o fundo */
    color: #3f4a56; /* Cor de texto mais escura e agradável */
    line-height: 1.6;
}
.container {
    max-width: 1200px;
    margin: 30px auto; /* Mais espaço em cima e embaixo */
    background-color: #ffffff;
    border-radius: 15px; /* Bordas mais arredondadas para um visual suave */
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); /* Sombra mais pronunciada e elegante */
    padding: 40px; /* Mais padding interno */
}
h1 {
    color: #3b5a7a; /* Um tom de azul mais profundo e sofisticado */
    text-align: center;
    margin-bottom: 40px; /* Mais espaço após o título */
    font-size: 2.8em; /* Título maior e mais impactante */
    font-weight: 700; /* Mais negrito */
    letter-spacing: -0.5px; /* Ajuste para melhor leitura */
}
h2 {
    color: #4a6fa3; /* Um tom de azul intermediário para subtítulos */
    margin-bottom: 25px;
    font-size: 1.8em;
    border-bottom: 2px solid #e0e0e0;
    padding-bottom: 10px;
}
/* --- ESTILO DAS ABAS REVISTO PARA DIVISÃO CLARA --- */
.tabs, .sub-tabs {
    display: flex;
    justify-content: flex-start; /* Alinha as abas à esquerda */
    margin-bottom: 30px;
    border-bottom: 2px solid #dbe2e8; /* Borda inferior sutil para a área das abas */
    gap: 0px; /* Remove o gap para os botões ficarem lado a lado na linha da borda */
    padding-left: 10px; /* Um pequeno padding para iniciar as abas */
}
.tab-button, .sub-tab-button {
    padding: 14px 25px;
    cursor: pointer;
    border: none;
    background-color: transparent; /* Fundo transparente para abas inativas */
    font-size: 1.15em;
    color: #6a829e; /* Cor do texto das abas inativas */
    transition: all 0.3s ease;
    border-bottom: 3px solid transparent; /* Borda inferior transparente por padrão */
    font-weight: 500;
    border-radius: 0; /* Remove border-radius para se alinhar à borda inferior */
    margin-right: 5px; /* Mantém um pequeno espaçamento entre os botões */
    position: relative; /* Necessário para ajustar a borda inferior da aba ativa */
    top: 2px; /* Ajusta a posição para que a borda ativa fique "em cima" da borda da área */
}
.tab-button:hover, .sub-tab-button:hover {
    color: #2e7bb0; /* Azul um pouco mais vibrante no hover */
    border-color: #aed6f1; /* Borda de hover mais clara */
    background-color: #f0f4f8; /* Um pequeno fundo no hover para feedback visual */
    transform: translateY(0); /* Remove o efeito de elevação para manter na linha */
}
.tab-button.active, .sub-tab-button.active {
    color: #4a90e2; /* Azul principal para o texto da aba ativa */
    border-bottom: 3px solid #4a90e2; /* Borda inferior azul principal para aba ativa */
    font-weight: 600;
    background-color: #ffffff; /* Fundo branco para a aba ativa se destacar */
    border-radius: 8px 8px 0 0; /* Apenas as bordas superiores arredondadas para dar um efeito de "aba levantada" */
    box-shadow: 0 -2px 8px rgba(0,0,0,0.05); /* Sombra suave superior */
    z-index: 1; /* Garante que a aba ativa fique por cima da borda da área */
    top: 0; /* Restaura a posição original para a aba ativa */
}
.tab-content, .sub-tab-content {
    display: none;
    padding: 25px; /* Ajustei o padding para o conteúdo da aba */
    border-top: none;
    background-color: #ffffff; /* Garante que o conteúdo da aba tenha o mesmo fundo */
    border-radius: 0 0 15px 15px; /* Arredonda apenas as bordas inferiores do conteúdo */
    box-shadow: 0 5px 15px rgba(0,0,0,0.05); /* Sombra para o conteúdo */
}
.tab-content.active, .sub-tab-content.active {
    display: block;
}
/* --- FIM DO ESTILO DAS ABAS --- */

form {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); /* Layout mais responsivo */
    gap: 25px; /* Mais espaçamento entre os campos */
    margin-top: 30px;
    padding: 35px;
    border: none;
    border-radius: 12px; /* Bordas mais arredondadas */
    background-color: #fcfdff; /* Fundo bem clarinho para o formulário */
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.05); /* Sombra interna sutil */
}
.form-group {
    display: flex;
    flex-direction: column;
}
label {
    margin-bottom: 10px;
    font-weight: 600;
    color: #5d748f;
    font-size: 0.95em;
}
input[type="text"],
input[type="number"],
input[type="date"],
select {
    padding: 12px 15px; /* Mais padding */
    border: 1px solid #dbe2e8; /* Borda mais suave */
    border-radius: 8px; /* Bordas arredondadas */
    font-size: 1em;
    width: 100%;
    box-sizing: border-box;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
    background-color: #ffffff;
}
input[type="text"]:focus,
input[type="number"]:focus,
input[type="date"]:focus,
select:focus {
    border-color: #4a90e2; /* Azul principal no foco */
    box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2); /* Sombra suave no foco */
    outline: none;
}
button[type="submit"] { /* Especificado para o botão de submit do form */
    grid-column: span 2; /* Mantém em duas colunas */
    padding: 14px 30px;
    background-color: #4a90e2; /* Azul principal */
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.15em;
    font-weight: 700;
    transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
    justify-self: center; /* Centraliza o botão na linha */
    width: auto; /* Ajusta a largura automaticamente ao conteúdo */
    min-width: 200px; /* Garante uma largura mínima */
    margin-top: 20px; /* Espaço extra acima do botão */
    box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3); /* Sombra para o botão */
}
button[type="submit"]:hover {
    background-color: #357bd8; /* Azul um pouco mais escuro no hover */
    transform: translateY(-3px); /* Efeito de elevação mais notável */
    box-shadow: 0 6px 16px rgba(74, 144, 226, 0.4); /* Sombra mais intensa no hover */
}
.message {
    margin-top: 25px;
    padding: 15px 20px;
    border-radius: 8px;
    font-weight: 600;
    grid-column: span 2;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.message.success {
    background-color: #e6ffed; /* Verde muito suave */
    color: #28a745; /* Verde vibrante */
    border: 1px solid #b3e7c5;
}
.message.error {
    background-color: #fff0f5; /* Vermelho muito suave */
    color: #dc3545; /* Vermelho vibrante */
    border: 1px solid #f5c7d0;
}
.data-display {
    margin-top: 30px;
}
/* Estilos para a tabela */
.data-table {
    width: 100%;
    border-collapse: collapse; /* Colapsa as bordas da tabela */
    margin-top: 20px;
    background-color: #ffffff;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    border-radius: 12px;
    overflow: hidden; /* Garante que bordas arredondadas se apliquem */
}

.data-table th, .data-table td {
    padding: 15px;
    text-align: left;
    border-bottom: 1px solid #eef2f6; /* Borda suave entre as linhas */
}

.data-table th {
    background-color: #eef4f9; /* Fundo para o cabeçalho */
    color: #4a6fa3;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.9em;
    letter-spacing: 0.5px;
}

.data-table tbody tr:hover {
    background-color: #f6faff; /* Efeito de hover nas linhas */
}

.data-table tbody tr:last-child td {
    border-bottom: none; /* Remove a borda da última linha */
}


.no-data {
    text-align: center;
    color: #8c9cb0;
    font-style: italic;
    padding: 40px;
    border: 2px dashed #dbe2e8; /* Borda tracejada mais visível */
    border-radius: 10px;
    margin-top: 30px;
    background-color: #fcfdff;
    font-size: 1.1em;
}

/* Os estilos para company-card e para contratos na visualização não serão mais usados */

    background-color: #f7faff;
    border: 1px solid #d4e3f5;
    padding: 15px 20px;
    margin-bottom: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    line-height: 1.8;
}
#sub-tab-contratos-view ul li strong {
    color: #3f4a56;
    margin-right: 5px;
} */
    </style>
</head>
<body>
    <div class="container">
        <h1>Gestão de Dados Supabase</h1>

        <div class="tabs">
            <button class="tab-button active" onclick="showTab('empresas')">Empresas</button>
            <button class="tab-button" onclick="showTab('contratos')">Contratos</button>
            <button class="tab-button" onclick="showTab('visualizar')">Visualizar Dados</button>
        </div>

        <!-- Tab Content: Empresas -->
        <div id="tab-empresas" class="tab-content active">
            <h2>Cadastrar Nova Empresa</h2>
            <form id="form-empresa">
                <div class="form-group">
                    <label for="empresa-nome">Nome da Empresa:</label>
                    <input type="text" id="empresa-nome" required>
                </div>
                <div class="form-group">
                    <label for="empresa-telefone-1">Telefone 1:</label>
                    <input type="text" id="empresa-telefone-1">
                </div>
                <div class="form-group">
                    <label for="empresa-telefone-2">Telefone 2:</label>
                    <input type="text" id="empresa-telefone-2">
                </div>
                <div class="form-group">
                    <label for="empresa-endereco">Endereço:</label>
                    <input type="text" id="empresa-endereco">
                </div>
                <div class="form-group">
                    <label for="empresa-responsavel">Responsável:</label>
                    <input type="text" id="empresa-responsavel">
                </div>
                <div class="form-group">
                    <label for="empresa-contato">Contato:</label>
                    <input type="text" id="empresa-contato">
                </div>
                <div class="form-group">
                    <label for="empresa-oportunidades">Oportunidades:</label>
                    <input type="text" id="empresa-oportunidades">
                </div>
                <button type="submit">Salvar Empresa</button>
                <div id="empresa-message" class="message" style="display: none;"></div>
            </form>
        </div>

        <!-- Tab Content: Contratos -->
        <div id="tab-contratos" class="tab-content">
            <h2>Cadastrar Novo Contrato</h2>
            <form id="form-contrato">
                <div class="form-group">
                    <label for="contrato-empresa-id">Empresa:</label>
                    <select id="contrato-empresa-id" required>
                        <option value="">Selecione uma empresa</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="contrato-valor-mensal">Valor Mensal:</label>
                    <input type="number" id="contrato-valor-mensal" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="contrato-valor-implementacao">Valor de Implementação:</label>
                    <input type="number" id="contrato-valor-implementacao" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="contrato-data-inicio">Data Início:</label>
                    <input type="date" id="contrato-data-inicio" required>
                </div>
                <div class="form-group">
                    <label for="contrato-data-fim">Data Fim:</label>
                    <input type="date" id="contrato-data-fim" required>
                </div>
                <div class="form-group">
                    <label for="contrato-status">Status:</label>
                    <select id="contrato-status" required>
                        <option value="ativo">Ativo</option>
                        <option value="inativo">Inativo</option>
                        <option value="pendente">Pendente</option>
                        <option value="cancelado">Cancelado</option>
                    </select>
                </div>
                <button type="submit">Salvar Contrato</button>
                <div id="contrato-message" class="message" style="display: none;"></div>
            </form>
        </div>

        <!-- Tab Content: Visualizar Dados -->
        <div id="tab-visualizar" class="tab-content">
            <h2>Dados Cadastrados</h2>
            <div class="sub-tabs">
                <button class="sub-tab-button active" onclick="showSubTab('sub-tab-empresas-view')">Empresas</button>
                <button class="sub-tab-button" onclick="showSubTab('sub-tab-contratos-view')">Contratos</button>
            </div>
            <div id="sub-tab-empresas-view" class="sub-tab-content active data-display">
                <p class="no-data">Carregando empresas...</p>
            </div>
            <div id="sub-tab-contratos-view" class="sub-tab-content data-display">
                <p class="no-data">Carregando contratos...</p>
            </div>
        </div>
    </div>

    <script>
        // ==========================
        // CONFIGURAÇÃO SUPABASE
        // ==========================
        const SUPABASE_URL = "https://htsorgukdbfuuypiuksm.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh0c29yZ3VrZGJmdXV5cGl1a3NtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3MDQ0NjMsImV4cCI6MjA4NTI4MDQ2M30.MVwsWMW1AX-tTDu5Vz_x9y6anb-DO10rZW2L_2B0NVM";

        const { createClient } = supabase;
        const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==========================
        // FUNÇÕES DE UTILIDADE
        // ==========================
        function showMessage(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = `message ${type}`;
            element.style.display = 'block';
            setTimeout(() => {
                element.style.display = 'none';
            }, 5000);
        }

        async function populateEmpresasDropdowns() {
            const { data, error } = await client
                .from('empresas')
                .select('id, nome')
                .order('nome', { ascending: true });

            if (error) {
                console.error("Erro ao carregar empresas para dropdown:", error);
                return;
            }

            const contratoDropdown = document.getElementById('contrato-empresa-id');

            // Limpa opções existentes, exceto a primeira (placeholder)
            contratoDropdown.innerHTML = '<option value="">Selecione uma empresa</option>';

            data.forEach(empresa => {
                const optionContrato = document.createElement('option');
                optionContrato.value = empresa.id;
                optionContrato.textContent = empresa.nome;
                contratoDropdown.appendChild(optionContrato);
            });
        }

        // ==========================
        // LÓGICA DAS ABAS PRINCIPAIS
        // ==========================
        function showTab(tabName) {
            // Remove 'active' de todos os botões e conteúdos
            document.querySelectorAll('.tab-button').forEach(button => {
                button.classList.remove('active');
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            // Adiciona 'active' ao botão e conteúdo da aba clicada
            document.querySelector(`.tab-button[onclick="showTab('${tabName}')"]`).classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');

            // Se for a aba de visualizar, carrega os dados e mostra a primeira sub-aba
            if (tabName === 'visualizar') {
                loadAndDisplayData();
                showSubTab('sub-tab-empresas-view'); // Mostra a sub-aba de empresas por padrão
            } else if (tabName === 'contratos') {
                populateEmpresasDropdowns(); // Popula dropdowns para contratos
            }
        }

        // ==========================
        // LÓGICA DAS SUB-ABAS (VISUALIZAR DADOS)
        // ==========================
        function showSubTab(subTabName) {
            document.querySelectorAll('.sub-tab-button').forEach(button => {
                button.classList.remove('active');
            });
            document.querySelectorAll('.sub-tab-content').forEach(content => {
                content.classList.remove('active');
            });

            document.querySelector(`.sub-tab-button[onclick="showSubTab('${subTabName}')"]`).classList.add('active');
            document.getElementById(subTabName).classList.add('active');
        }

        // ==========================
        // FORMULÁRIOS DE INSERÇÃO
        // ==========================

        // Form Empresa
        document.getElementById('form-empresa').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('empresa-nome').value.trim();
            const telefone_1 = document.getElementById('empresa-telefone-1').value.trim();
            const telefone_2 = document.getElementById('empresa-telefone-2').value.trim();
            const endereco = document.getElementById('empresa-endereco').value.trim();
            const responsavel = document.getElementById('empresa-responsavel').value.trim();
            const contato = document.getElementById('empresa-contato').value.trim();
            const oportunidades = document.getElementById('empresa-oportunidades').value.trim(); // Novo campo


            if (!nome) {
                showMessage('empresa-message', 'O nome da empresa é obrigatório.', 'error');
                return;
            }

            try {
                const { data, error } = await client
                    .from('empresas')
                    .insert({ 
                        nome: nome,
                        telefone_1: telefone_1 || null,
                        telefone_2: telefone_2 || null,
                        endereco: endereco || null,
                        responsavel: responsavel || null,
                        contato: contato || null,
                        oportunidades: oportunidades || null // Novo campo
                    })
                    .select();

                if (error) throw error;

                showMessage('empresa-message', `Empresa "${data[0].nome}" cadastrada com sucesso!`, 'success');
                e.target.reset(); // Limpa o formulário
                populateEmpresasDropdowns(); // Atualiza os dropdowns
                loadAndDisplayData(); // Atualiza a visualização
            } catch (error) {
                console.error("Erro ao cadastrar empresa:", error);
                showMessage('empresa-message', `Erro ao cadastrar empresa: ${error.message}`, 'error');
            }
        });

        // Form Contrato
        document.getElementById('form-contrato').addEventListener('submit', async (e) => {
            e.preventDefault();
            const empresa_id = document.getElementById('contrato-empresa-id').value;
            const valor_mensal = parseFloat(document.getElementById('contrato-valor-mensal').value);
            const valor_implementacao = parseFloat(document.getElementById('contrato-valor-implementacao').value);
            const data_inicio = document.getElementById('contrato-data-inicio').value;
            const data_fim = document.getElementById('contrato-data-fim').value;
            const status = document.getElementById('contrato-status').value;

            if (!empresa_id || isNaN(valor_mensal) || isNaN(valor_implementacao) || !data_inicio || !data_fim || !status) {
                showMessage('contrato-message', 'Por favor, preencha todos os campos corretamente.', 'error');
                return;
            }

            try {
                const { data, error } = await client
                    .from('contratos')
                    .insert({
                        empresa_id: empresa_id,
                        valor_mensal: valor_mensal,
                        valor_implementacao: valor_implementacao,
                        data_inicio: data_inicio,
                        data_fim: data_fim,
                        status: status
                    })
                    .select();

                if (error) throw error;

                showMessage('contrato-message', `Contrato (ID: ${data[0].id.substring(0, 8)}...) cadastrado com sucesso!`, 'success');
                e.target.reset(); // Limpa o formulário
                loadAndDisplayData(); // Atualiza a visualização
            } catch (error) {
                console.error("Erro ao cadastrar contrato:", error);
                showMessage('contrato-message', `Erro ao cadastrar contrato: ${error.message}`, 'error');
            }
        });

        // ==========================
        // VISUALIZAÇÃO DE DADOS - MODIFICADA PARA TABELAS
        // ==========================
        async function loadAndDisplayData() {
            const empresasDisplayArea = document.getElementById('sub-tab-empresas-view');
            const contratosDisplayArea = document.getElementById('sub-tab-contratos-view');

            empresasDisplayArea.innerHTML = '<p class="no-data">Carregando empresas...</p>';
            contratosDisplayArea.innerHTML = '<p class="no-data">Carregando contratos...</p>';

            try {
                // Fetch Empresas - Seleciona todos os campos para exibição completa
                const { data: empresas, error: empresasError } = await client
                    .from('empresas')
                    .select('*') // Seleciona todos os campos
                    .order('nome', { ascending: true });

                if (empresasError) throw empresasError;

                let empresasHtml = '';
                if (empresas.length === 0) {
                    empresasHtml = '<p class="no-data">Nenhuma empresa cadastrada ainda.</p>';
                } else {
                    empresasHtml += `
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nome</th>
                                    <th>Telefone 1</th>
                                    <th>Telefone 2</th>
                                    <th>Endereço</th>
                                    <th>Responsável</th>
                                    <th>Contato</th>
                                    <th>Oportunidades</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;
                    empresas.forEach(empresa => {
                        empresasHtml += `
                                <tr>
                                    <td>${empresa.id.substring(0, 8)}...</td>
                                    <td>${empresa.nome || 'N/A'}</td>
                                    <td>${empresa.telefone_1 || 'N/A'}</td>
                                    <td>${empresa.telefone_2 || 'N/A'}</td>
                                    <td>${empresa.endereco || 'N/A'}</td>
                                    <td>${empresa.responsavel || 'N/A'}</td>
                                    <td>${empresa.contato || 'N/A'}</td>
                                    <td>${empresa.oportunidades || 'N/A'}</td>
                                </tr>
                        `;
                    });
                    empresasHtml += `
                            </tbody>
                        </table>
                    `;
                }
                empresasDisplayArea.innerHTML = empresasHtml;

                // Fetch Contratos (with company names)
                const { data: contratos, error: contratosError } = await client
                    .from('contratos')
                    .select('*, empresas(nome)') // Join with empresas to get company name
                    .order('created_at', { ascending: false });

                if (contratosError) throw contratosError;

                let contratosHtml = '';
                if (contratos.length === 0) {
                    contratosHtml = '<p class="no-data">Nenhum contrato cadastrado ainda.</p>';
                } else {
                    contratosHtml += `
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Empresa</th>
                                    <th>ID Contrato</th>
                                    <th>Valor Mensal</th>
                                    <th>Valor Impl.</th>
                                    <th>Início</th>
                                    <th>Fim</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;
                    contratos.forEach(contrato => {
                        const empresaNome = contrato.empresas && contrato.empresas.nome ? contrato.empresas.nome : 'Empresa Desconhecida';
                        contratosHtml += `
                                <tr>
                                    <td>${empresaNome}</td>
                                    <td>${contrato.id.substring(0, 8)}...</td>
                                    <td>R$ ${parseFloat(contrato.valor_mensal).toFixed(2).replace('.', ',')}</td>
                                    <td>R$ ${parseFloat(contrato.valor_implementacao || 0).toFixed(2).replace('.', ',')}</td>
                                    <td>${contrato.data_inicio}</td>
                                    <td>${contrato.data_fim}</td>
                                    <td>${contrato.status}</td>
                                </tr>
                        `;
                    });
                    contratosHtml += `
                            </tbody>
                        </table>
                    `;
                }
                contratosDisplayArea.innerHTML = contratosHtml;

            } catch (error) {
                console.error("Erro ao carregar dados para visualização:", error);
                empresasDisplayArea.innerHTML = `<p class="no-data error">Erro ao carregar empresas: ${error.message}</p>`;
                contratosDisplayArea.innerHTML = `<p class="no-data error">Erro ao carregar contratos: ${error.message}</p>`;
            }
        }

        // ==========================
        // INICIALIZAÇÃO
        // ==========================
        document.addEventListener('DOMContentLoaded', () => {
            showTab('empresas'); // Mostra a aba de empresas por padrão
            populateEmpresasDropdowns(); // Popula os dropdowns na carga inicial
        });
    </script>
</body>
</html>
