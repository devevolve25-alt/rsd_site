<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chat IA e Dados Supabase Hierárquico</title>
<style>
  /* Reset básico */
  body, html {
    margin: 0; padding: 0; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex; overflow: hidden; background: #f0f4f8;
    color: #333;
  }

  /* Container do chat */
  #chat-container {
    flex: 0 0 25%;
    max-width: 25%;
    min-width: 25%;
    border-right: 1px solid #d1d9e6;
    display: flex;
    flex-direction: column;
    background: #ffffff;
    box-shadow: 2px 0 8px rgba(0,0,0,0.05);
    overflow: hidden;
  }

  /* Área de mensagens */
  #chat-messages {
    flex-grow: 1;
    padding: 20px;
    overflow-y: auto;
    max-width: 100%;
    word-wrap: break-word;
    box-sizing: border-box;
    scrollbar-width: thin;
    scrollbar-color: #a0aec0 transparent;
  }
  #chat-messages::-webkit-scrollbar {
    width: 8px;
  }
  #chat-messages::-webkit-scrollbar-thumb {
    background-color: #a0aec0;
    border-radius: 4px;
  }

  /* Mensagens */
  .message {
    margin-bottom: 14px;
    max-width: 100%;
    padding: 12px 18px;
    border-radius: 20px;
    white-space: pre-wrap;
    box-shadow: 0 2px 6px rgba(0,0,0,0.07);
    font-size: 15px;
    line-height: 1.4;
    word-wrap: break-word;
    word-break: break-word;
    box-sizing: border-box;
    transition: background-color 0.3s ease;
  }
  .message.user {
    background-color: #3b82f6;
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
    text-align: right;
  }
  .message.ia {
    background-color: #e2e8f0;
    color: #2d3748;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    text-align: left;
  }

  /* Input do chat */
  #chat-input {
    width: 100%;
    box-sizing: border-box;
    border: none;
    border-top: 1px solid #d1d9e6;
    padding: 16px 20px;
    font-size: 16px;
    resize: none;
    height: 70px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #2d3748;
    background-color: #f7fafc;
    transition: background-color 0.3s ease, border-color 0.3s ease;
    max-width: 100%;
    overflow-wrap: break-word;
  }
  #chat-input:focus {
    outline: none;
    background-color: #ffffff;
    border-top: 1px solid #3b82f6;
    box-shadow: 0 -2px 4px rgba(59,130,246,0.3);
  }
  #chat-input::placeholder {
    color: #94a3b8;
    font-style: italic;
  }

  /* Container dos dados */
  #data-container {
    flex: 1 1 auto;
    max-width: 75%;
    min-width: 75%;
    padding: 30px 25px;
    overflow-y: auto;
    background: #ffffff;
    box-shadow: -2px 0 8px rgba(0,0,0,0.05);
    box-sizing: border-box;
    scrollbar-width: thin;
    scrollbar-color: #a0aec0 transparent;
  }
  #data-container::-webkit-scrollbar {
    width: 8px;
  }
  #data-container::-webkit-scrollbar-thumb {
    background-color: #a0aec0;
    border-radius: 4px;
  }

  /* Títulos */
  h2 {
    margin-top: 0;
    margin-bottom: 15px;
    font-weight: 700;
    font-size: 24px;
    color: #334155;
    border-bottom: 2px solid #3b82f6;
    padding-bottom: 5px;
    user-select: none;
  }

  h3 {
    margin-top: 20px;
    margin-bottom: 10px;
    color: #475569;
    font-weight: 600;
    font-size: 18px;
  }

  /* Tabelas */
  table {
    width: 100%;
    table-layout: fixed;
    border-collapse: separate;
    border-spacing: 0 8px;
    margin-bottom: 20px;
    font-size: 15px;
    color: #334155;
    word-wrap: break-word;
    word-break: break-word;
  }

  th, td {
    padding: 12px 15px;
    overflow-wrap: break-word;
  }

  thead th {
    background-color: #e0e7ff;
    font-weight: 700;
    color: #1e40af;
    text-align: left;
    border-top-left-radius: 8px;
    border-top-right-radius: 8px;
  }

  tbody tr {
    background-color: #f8fafc;
    box-shadow: 0 1px 3px rgb(0 0 0 / 0.1);
    border-radius: 8px;
  }

  tbody tr.clickable:hover {
    background-color: #dbeafe;
    cursor: pointer;
    box-shadow: 0 3px 6px rgba(59, 130, 246, 0.25);
    transition: background-color 0.3s ease, box-shadow 0.3s ease;
  }

  tbody tr td:first-child {
    border-radius: 8px 0 0 8px;
  }
  tbody tr td:last-child {
    border-radius: 0 8px 8px 0;
  }

  /* Nested container */
  .nested-table-container {
    margin-left: 20px;
    margin-bottom: 25px;
    border-left: 3px solid #93c5fd;
    padding-left: 15px;
    background: #f1f5f9;
    border-radius: 8px;
  }
</style>
</head>
<body>

<div id="chat-container">
  <div id="chat-messages"></div>
  <textarea id="chat-input" placeholder="Digite sua mensagem (Shift+Enter para nova linha)..."></textarea>
</div>

<div id="data-container">
  <h2>student</h2>
  <table id="table-student">
    <thead><tr><th>id</th><th>nome</th><th>level</th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<script>
  // Seu script permanece inalterado para manter funcionalidades
  const SUPABASE_URL = 'https://htsorgukdbfuuypiuksm.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_8bpn_JEYZU2YzVMC5UK3CA_9Kn4LPdm';
  const WEBHOOK_IA = 'https://powerfulkiwi-n8n.cloudfy.live/webhook/english_page';

  const headersSupabase = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
  };

  async function fetchTable(table, columns, filter = null) {
    let url = `${SUPABASE_URL}/rest/v1/${table}?select=${columns.join(',')}`;
    if (filter) {
      url += `&${filter}`;
    }
    try {
      const res = await fetch(url, { headers: headersSupabase });
      if (!res.ok) throw new Error(`Erro ao buscar ${table}: ${res.status}`);
      return await res.json();
    } catch (e) {
      console.error(e);
      return [];
    }
  }

  function createTable(columns, data, rowClickHandler = null) {
    const table = document.createElement('table');
    const thead = document.createElement('thead');
    const trHead = document.createElement('tr');
    columns.forEach(col => {
      const th = document.createElement('th');
      th.textContent = col;
      trHead.appendChild(th);
    });
    thead.appendChild(trHead);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    data.forEach(row => {
      const tr = document.createElement('tr');
      if (rowClickHandler) {
        tr.classList.add('clickable');
        tr.style.userSelect = 'none';
        tr.addEventListener('click', () => rowClickHandler(row, tr));
      }
      columns.forEach(col => {
        const td = document.createElement('td');
        td.textContent = row[col] ?? '';
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    return table;
  }

  function clearElement(el) {
    while (el.firstChild) el.removeChild(el.firstChild);
  }

  const openedStudentRows = new Map();
  const openedClassPlanRows = new Map();

  async function loadStudents() {
    const students = await fetchTable('student', ['id', 'nome', 'level']);
    const tbody = document.querySelector('#table-student tbody');
    clearElement(tbody);

    students.forEach(student => {
      const tr = document.createElement('tr');
      tr.classList.add('clickable');
      tr.style.userSelect = 'none';
      tr.dataset.studentId = student.id;

      tr.innerHTML = `
        <td>${student.id}</td>
        <td>${student.nome}</td>
        <td>${student.level}</td>
      `;

      tr.addEventListener('click', async () => {
        if (openedStudentRows.has(tr)) {
          openedStudentRows.get(tr).remove();
          openedStudentRows.delete(tr);
          return;
        }
        for (const [row, container] of openedStudentRows.entries()) {
          container.remove();
          openedStudentRows.delete(row);
        }
        for (const [row, container] of openedClassPlanRows.entries()) {
          container.remove();
          openedClassPlanRows.delete(row);
        }

        const classPlans = await fetchTable('class_plan', ['id', 'description'], `id_student=eq.${student.id}`);
        const container = document.createElement('div');
        container.className = 'nested-table-container';

        if (classPlans.length === 0) {
          container.textContent = 'Nenhum class_plan encontrado para este estudante.';
        } else {
          const tableCP = createTable(['id', 'description'], classPlans, async (classPlanRow, cpTr) => {
            if (openedClassPlanRows.has(cpTr)) {
              openedClassPlanRows.get(cpTr).remove();
              openedClassPlanRows.delete(cpTr);
              return;
            }
            for (const [row, container] of openedClassPlanRows.entries()) {
              container.remove();
              openedClassPlanRows.delete(row);
            }

            const classes = await fetchTable('classes', ['id', 'type', 'title', 'description'], `id_class_plan=eq.${classPlanRow.id}`);

            const classIds = classes.map(c => c.id);
            let exercisesFiltered = [];
            if (classIds.length > 0) {
              const filterIds = classIds.map(id => `"${id}"`).join(',');
              const urlExercises = `${SUPABASE_URL}/rest/v1/exercises?select=id,type&id_class=in.(${filterIds})`;
              try {
                const resEx = await fetch(urlExercises, { headers: headersSupabase });
                if (resEx.ok) {
                  exercisesFiltered = await resEx.json();
                }
              } catch (e) {
                console.error('Erro ao buscar exercises filtrados:', e);
              }
            }

            const nestedContainer = document.createElement('div');
            nestedContainer.className = 'nested-table-container';

            if (classes.length === 0) {
              const p = document.createElement('p');
              p.textContent = 'Nenhuma classe encontrada para este class_plan.';
              nestedContainer.appendChild(p);
            } else {
              const h3Classes = document.createElement('h3');
              h3Classes.textContent = 'classes';
              nestedContainer.appendChild(h3Classes);
              const tableClasses = createTable(['id', 'type', 'title', 'description'], classes);
              nestedContainer.appendChild(tableClasses);
            }

            if (exercisesFiltered.length === 0) {
              const p = document.createElement('p');
              p.textContent = 'Nenhum exercício encontrado para as classes deste class_plan.';
              nestedContainer.appendChild(p);
            } else {
              const h3Exercises = document.createElement('h3');
              h3Exercises.textContent = 'exercises';
              nestedContainer.appendChild(h3Exercises);
              const tableExercises = createTable(['id', 'type'], exercisesFiltered);
              nestedContainer.appendChild(tableExercises);
            }

            cpTr.parentNode.insertBefore(nestedContainer, cpTr.nextSibling);
            openedClassPlanRows.set(cpTr, nestedContainer);
          });
          container.appendChild(tableCP);
        }

        tr.parentNode.insertBefore(container, tr.nextSibling);
        openedStudentRows.set(tr, container);
      });

      tbody.appendChild(tr);
    });
  }

  const chatMessagesDiv = document.getElementById('chat-messages');
  const chatInput = document.getElementById('chat-input');

  function addMessage(sender, text) {
    const div = document.createElement('div');
    div.className = 'message ' + sender;
    div.textContent = text;
    chatMessagesDiv.appendChild(div);
    chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
  }

  async function sendMessage() {
    const text = chatInput.value.trim();
    if (!text) return;
    addMessage('user', text);
    chatInput.value = '';

    try {
      const res = await fetch(WEBHOOK_IA, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
      if (!res.ok) {
        addMessage('ia', 'Erro na resposta do agente IA.');
        return;
      }
      const data = await res.json();
      const reply = data.reply || 'Resposta vazia do agente IA.';
      addMessage('ia', reply);
    } catch (e) {
      addMessage('ia', 'Falha na comunicação com o agente IA.');
    }
  }

  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  window.onload = loadStudents;
</script>

</body>
</html>
