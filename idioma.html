<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chat IA e Dados Supabase Hierárquico Avançado</title>
<style>
  body, html {
    margin: 0; padding: 0; height: 100vh; font-family: Arial, sans-serif;
    display: flex; flex-direction: column; overflow: hidden;
  }
  #tabs {
    display: flex;
    border-bottom: 1px solid #ccc;
  }
  #tabs button {
    flex: 1;
    padding: 10px;
    font-size: 16px;
    background: #f0f0f0;
    border: none;
    border-bottom: 3px solid transparent;
    cursor: pointer;
  }
  #tabs button[aria-selected="true"] {
    border-bottom-color: #007bff;
    background: white;
    font-weight: bold;
  }
  #content {
    flex-grow: 1;
    display: flex;
    overflow: hidden;
  }
  #chat-container, #data-container {
    flex-basis: 50%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #chat-container {
    border-right: 1px solid #ccc;
    background: #f9f9f9;
  }
  #chat-messages {
    flex-grow: 1; padding: 10px; overflow-y: auto;
  }
  .message {
    margin-bottom: 10px; max-width: 80%; padding: 8px 12px; border-radius: 15px; white-space: pre-wrap;
  }
  .message.user {
    background-color: #007bff; color: white; align-self: flex-end; text-align: right;
  }
  .message.ia {
    background-color: #e5e5ea; color: black; align-self: flex-start; text-align: left;
  }
  #chat-input {
    width: 100%; box-sizing: border-box; border: none; border-top: 1px solid #ccc;
    padding: 10px; font-size: 14px; resize: none; height: 60px;
  }
  #data-container {
    padding: 10px; overflow-y: auto;
  }
  h2 {
    margin-top: 10px; margin-bottom: 5px;
  }
  table {
    width: 100%; border-collapse: collapse; margin-bottom: 10px;
  }
  th, td {
    border: 1px solid #999; padding: 5px; text-align: left;
    word-break: break-word;
  }
  tr.clickable:hover {
    background-color: #eef;
    cursor: pointer;
  }
  .nested-table-container {
    margin-left: 20px;
    margin-bottom: 15px;
    border-left: 2px solid #ccc;
    padding-left: 10px;
  }
  .toggle-icon {
    display: inline-block;
    width: 16px;
    user-select: none;
    font-weight: bold;
    margin-right: 6px;
    cursor: pointer;
  }
  .loading-spinner {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #007bff;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    animation: spin 1s linear infinite;
    margin: 10px auto;
  }
  @keyframes spin {
    0% { transform: rotate(0deg);}
    100% { transform: rotate(360deg);}
  }
  #search-container {
    margin-bottom: 10px;
  }
  #search-input {
    width: 100%;
    padding: 6px 10px;
    font-size: 14px;
    box-sizing: border-box;
  }
  .pagination {
    margin-top: 5px;
    text-align: right;
  }
  .pagination button {
    margin-left: 5px;
    padding: 4px 8px;
    font-size: 14px;
    cursor: pointer;
  }
  .pagination button:disabled {
    opacity: 0.5;
    cursor: default;
  }
</style>
</head>
<body>

<div id="tabs" role="tablist" aria-label="Seletor de abas">
  <button role="tab" aria-selected="true" aria-controls="chat-panel" id="tab-chat" tabindex="0">Chat IA</button>
  <button role="tab" aria-selected="false" aria-controls="data-panel" id="tab-data" tabindex="-1">Dados</button>
</div>

<div id="content">
  <section id="chat-container" role="tabpanel" tabindex="0" aria-labelledby="tab-chat">
    <div id="chat-messages" aria-live="polite" aria-relevant="additions"></div>
    <textarea id="chat-input" placeholder="Digite sua mensagem (Shift+Enter para nova linha)..." aria-label="Campo de mensagem do chat"></textarea>
  </section>

  <section id="data-container" role="tabpanel" tabindex="0" aria-labelledby="tab-data" hidden>
    <div id="search-container">
      <input type="search" id="search-input" placeholder="Buscar students..." aria-label="Buscar students" />
    </div>
    <h2>student</h2>
    <div id="table-student-container"></div>
  </section>
</div>

<script>
  const SUPABASE_URL = 'https://htsorgukdbfuuypiuksm.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_8bpn_JEYZU2YzVMC5UK3CA_9Kn4LPdm';
  const WEBHOOK_IA = 'https://powerfulkiwi-n8n.cloudfy.live/webhook/english_page';

  const headersSupabase = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
  };

  // PAGINAÇÃO CONFIG
  const PAGE_SIZE = 10;

  // Estado global para dados e paginação
  let studentsData = [];
  let filteredStudents = [];
  let currentStudentPage = 1;

  // Controle de expansões múltiplas
  const openedStudentRows = new Map(); // tr => container
  const openedClassPlanRows = new Map(); // tr => container

  // Tabs controle
  const tabChat = document.getElementById('tab-chat');
  const tabData = document.getElementById('tab-data');
  const chatContainer = document.getElementById('chat-container');
  const dataContainer = document.getElementById('data-container');

  tabChat.addEventListener('click', () => {
    tabChat.setAttribute('aria-selected', 'true');
    tabChat.tabIndex = 0;
    tabData.setAttribute('aria-selected', 'false');
    tabData.tabIndex = -1;
    chatContainer.hidden = false;
    dataContainer.hidden = true;
    chatContainer.focus();
  });
  tabData.addEventListener('click', () => {
    tabData.setAttribute('aria-selected', 'true');
    tabData.tabIndex = 0;
    tabChat.setAttribute('aria-selected', 'false');
    tabChat.tabIndex = -1;
    dataContainer.hidden = false;
    chatContainer.hidden = true;
    dataContainer.focus();
  });

  // Função para buscar dados de uma tabela no Supabase com filtro opcional e paginação
  async function fetchTable(table, columns, filter = null, page = 1, pageSize = PAGE_SIZE) {
    let url = `${SUPABASE_URL}/rest/v1/${table}?select=${columns.join(',')}&limit=${pageSize}&offset=${(page-1)*pageSize}`;
    if (filter) {
      url += `&${filter}`;
    }
    try {
      const res = await fetch(url, { headers: headersSupabase });
      if (!res.ok) throw new Error(`Erro ao buscar ${table}: ${res.status}`);
      return await res.json();
    } catch (e) {
      console.error(e);
      return [];
    }
  }

  // Função para criar tabela HTML simples com paginação e busca
  function createTable(columns, data, rowClickHandler = null, paginationHandler = null, currentPage = 1, totalCount = null) {
    const container = document.createElement('div');

    const table = document.createElement('table');
    const thead = document.createElement('thead');
    const trHead = document.createElement('tr');
    columns.forEach(col => {
      const th = document.createElement('th');
      th.textContent = col;
      trHead.appendChild(th);
    });
    thead.appendChild(trHead);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    data.forEach(row => {
      const tr = document.createElement('tr');
      if (rowClickHandler) {
        tr.classList.add('clickable');
        tr.style.userSelect = 'none';
        tr.tabIndex = 0;
        tr.setAttribute('role', 'button');
        tr.setAttribute('aria-pressed', 'false');
        tr.addEventListener('click', () => rowClickHandler(row, tr));
        tr.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            rowClickHandler(row, tr);
          }
        });
      }
      columns.forEach(col => {
        const td = document.createElement('td');
        td.textContent = row[col] ?? '';
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    container.appendChild(table);

    if (paginationHandler && totalCount !== null) {
      const paginationDiv = document.createElement('div');
      paginationDiv.className = 'pagination';

      const totalPages = Math.ceil(totalCount / PAGE_SIZE);

      const btnPrev = document.createElement('button');
      btnPrev.textContent = 'Anterior';
      btnPrev.disabled = currentPage <= 1;
      btnPrev.addEventListener('click', () => paginationHandler(currentPage - 1));
      paginationDiv.appendChild(btnPrev);

      const pageInfo = document.createElement('span');
      pageInfo.textContent = ` Página ${currentPage} de ${totalPages} `;
      paginationDiv.appendChild(pageInfo);

      const btnNext = document.createElement('button');
      btnNext.textContent = 'Próximo';
      btnNext.disabled = currentPage >= totalPages;
      btnNext.addEventListener('click', () => paginationHandler(currentPage + 1));
      paginationDiv.appendChild(btnNext);

      container.appendChild(paginationDiv);
    }

    return container;
  }

  // Limpa todos os filhos de um elemento
  function clearElement(el) {
    while (el.firstChild) el.removeChild(el.firstChild);
  }

  // Cria ícone toggle +/-
  function createToggleIcon(open = false) {
    const icon = document.createElement('span');
    icon.className = 'toggle-icon';
    icon.textContent = open ? '−' : '+';
    icon.setAttribute('aria-hidden', 'true');
    return icon;
  }

  // Cria spinner loading
  function createLoadingSpinner() {
    const spinner = document.createElement('div');
    spinner.className = 'loading-spinner';
    spinner.setAttribute('aria-label', 'Carregando');
    spinner.setAttribute('role', 'status');
    return spinner;
  }

  // Atualiza tabela students com paginação e busca
  async function updateStudentsTable(page = 1, searchTerm = '') {
    const container = document.getElementById('table-student-container');
    clearElement(container);

    // Spinner loading
    const spinner = createLoadingSpinner();
    container.appendChild(spinner);

    // Busca total para paginação
    let filter = null;
    if (searchTerm) {
      // filtro simples para nome com ilike (case insensitive)
      filter = `nome=ilike.*${encodeURIComponent(searchTerm)}*`;
    }

    // Para total count, Supabase REST não fornece diretamente, usar RPC ou workaround
    // Aqui vamos buscar uma página e assumir que tem mais se retornar PAGE_SIZE
    // Para demo, vamos buscar PAGE_SIZE + 1 para saber se tem próxima página

    const url = `${SUPABASE_URL}/rest/v1/student?select=id,nome,level&limit=${PAGE_SIZE + 1}` + (filter ? `&${filter}` : '') + `&offset=${(page-1)*PAGE_SIZE}`;
    let data = [];
    try {
      const res = await fetch(url, { headers: headersSupabase });
      if (!res.ok) throw new Error(`Erro ao buscar student: ${res.status}`);
      data = await res.json();
    } catch (e) {
      console.error(e);
      container.textContent = 'Erro ao carregar students.';
      return;
    }

    // Remove spinner
    clearElement(container);

    // Detecta se tem próxima página
    const hasNextPage = data.length > PAGE_SIZE;
    if (hasNextPage) data.pop();

    studentsData = data;
    filteredStudents = data;

    // Cria tabela com paginação
    const tableWithPagination = createTable(
      ['id', 'nome', 'level'],
      data,
      onStudentRowClick,
      (newPage) => updateStudentsTable(newPage, searchTerm),
      page,
      hasNextPage ? page * PAGE_SIZE + 1 : page * PAGE_SIZE
    );
    container.appendChild(tableWithPagination);
  }

  // Busca class_plan por id_student
  async function fetchClassPlansByStudentId(studentId) {
    const url = `${SUPABASE_URL}/rest/v1/class_plan?select=id,description&id_student=eq.${studentId}`;
    try {
      const res = await fetch(url, { headers: headersSupabase });
      if (!res.ok) throw new Error(`Erro ao buscar class_plan: ${res.status}`);
      return await res.json();
    } catch (e) {
      console.error(e);
      return [];
    }
  }

  // Busca classes por id_class_plan
  async function fetchClassesByClassPlanId(classPlanId) {
    const url = `${SUPABASE_URL}/rest/v1/classes?select=id,type,title,description&id_class_plan=eq.${classPlanId}`;
    try {
      const res = await fetch(url, { headers: headersSupabase });
      if (!res.ok) throw new Error(`Erro ao buscar classes: ${res.status}`);
      return await res.json();
    } catch (e) {
      console.error(e);
      return [];
    }
  }

  // Busca exercises por array de id_class
  async function fetchExercisesByClassIds(classIds) {
    if (classIds.length === 0) return [];
    const filterIds = classIds.map(id => `"${id}"`).join(',');
    const url = `${SUPABASE_URL}/rest/v1/exercises?select=id,type&id_class=in.(${filterIds})`;
    try {
      const res = await fetch(url, { headers: headersSupabase });
      if (!res.ok) throw new Error(`Erro ao buscar exercises: ${res.status}`);
      return await res.json();
    } catch (e) {
      console.error(e);
      return [];
    }
  }

  // Handler clique linha student
  async function onStudentRowClick(student, tr) {
    // Toggle container
    if (openedStudentRows.has(tr)) {
      openedStudentRows.get(tr).remove();
      openedStudentRows.delete(tr);
      tr.querySelector('.toggle-icon').textContent = '+';
      tr.setAttribute('aria-pressed', 'false');
      return;
    }
    tr.querySelector('.toggle-icon').textContent = '−';
    tr.setAttribute('aria-pressed', 'true');

    // Não fechar outros para múltiplas expansões simultâneas

    // Container loading
    const container = document.createElement('div');
    container.className = 'nested-table-container';
    const spinner = createLoadingSpinner();
    container.appendChild(spinner);

    tr.parentNode.insertBefore(container, tr.nextSibling);
    openedStudentRows.set(tr, container);

    // Busca class plans
    const classPlans = await fetchClassPlansByStudentId(student.id);
    container.removeChild(spinner);

    if (classPlans.length === 0) {
      container.textContent = 'Nenhum class_plan encontrado para este estudante.';
      return;
    }

    // Cria tabela class_plan com toggle icons
    const tableCP = document.createElement('table');
    const thead = document.createElement('thead');
    const trHead = document.createElement('tr');
    [' ', 'id', 'description'].forEach(col => {
      const th = document.createElement('th');
      th.textContent = col;
      trHead.appendChild(th);
    });
    thead.appendChild(trHead);
    tableCP.appendChild(thead);

    const tbody = document.createElement('tbody');
    classPlans.forEach(cp => {
      const trCP = document.createElement('tr');
      trCP.classList.add('clickable');
      trCP.style.userSelect = 'none';
      trCP.tabIndex = 0;
      trCP.setAttribute('role', 'button');
      trCP.setAttribute('aria-pressed', 'false');

      // Toggle icon cell
      const tdIcon = document.createElement('td');
      const icon = createToggleIcon(false);
      tdIcon.appendChild(icon);
      trCP.appendChild(tdIcon);

      // id cell
      const tdId = document.createElement('td');
      tdId.textContent = cp.id;
      trCP.appendChild(tdId);

      // description cell
      const tdDesc = document.createElement('td');
      tdDesc.textContent = cp.description;
      trCP.appendChild(tdDesc);

      // Click handler
      trCP.addEventListener('click', () => onClassPlanRowClick(cp, trCP, icon));
      trCP.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          onClassPlanRowClick(cp, trCP, icon);
        }
      });

      tbody.appendChild(trCP);
    });
    tableCP.appendChild(tbody);

    container.appendChild(tableCP);
  }

  // Handler clique linha class_plan
  async function onClassPlanRowClick(classPlan, tr, icon) {
    if (openedClassPlanRows.has(tr)) {
      openedClassPlanRows.get(tr).remove();
      openedClassPlanRows.delete(tr);
      icon.textContent = '+';
      tr.setAttribute('aria-pressed', 'false');
      return;
    }
    icon.textContent = '−';
    tr.setAttribute('aria-pressed', 'true');

    // Container loading
    const container = document.createElement('div');
    container.className = 'nested-table-container';
    const spinner = createLoadingSpinner();
    container.appendChild(spinner);

    tr.parentNode.insertBefore(container, tr.nextSibling);
    openedClassPlanRows.set(tr, container);

    // Busca classes e exercises
    const classes = await fetchClassesByClassPlanId(classPlan.id);
    const classIds = classes.map(c => c.id);
    const exercises = await fetchExercisesByClassIds(classIds);

    container.removeChild(spinner);

    // Classes
    if (classes.length === 0) {
      const p = document.createElement('p');
      p.textContent = 'Nenhuma classe encontrada para este class_plan.';
      container.appendChild(p);
    } else {
      const h3Classes = document.createElement('h3');
      h3Classes.textContent = 'classes';
      container.appendChild(h3Classes);

      const tableClasses = document.createElement('table');
      const thead = document.createElement('thead');
      const trHead = document.createElement('tr');
      ['id', 'type', 'title', 'description'].forEach(col => {
        const th = document.createElement('th');
        th.textContent = col;
        trHead.appendChild(th);
      });
      thead.appendChild(trHead);
      tableClasses.appendChild(thead);

      const tbody = document.createElement('tbody');
      classes.forEach(c => {
        const trC = document.createElement('tr');
        ['id', 'type', 'title', 'description'].forEach(col => {
          const td = document.createElement('td');
          td.textContent = c[col] ?? '';
          trC.appendChild(td);
        });
        tbody.appendChild(trC);
      });
      tableClasses.appendChild(tbody);
      container.appendChild(tableClasses);
    }

    // Exercises
    if (exercises.length === 0) {
      const p = document.createElement('p');
      p.textContent = 'Nenhum exercício encontrado para as classes deste class_plan.';
      container.appendChild(p);
    } else {
      const h3Exercises = document.createElement('h3');
      h3Exercises.textContent = 'exercises';
      container.appendChild(h3Exercises);

      const tableExercises = document.createElement('table');
      const thead = document.createElement('thead');
      const trHead = document.createElement('tr');
      ['id', 'type'].forEach(col => {
        const th = document.createElement('th');
        th.textContent = col;
        trHead.appendChild(th);
      });
      thead.appendChild(trHead);
      tableExercises.appendChild(thead);

      const tbody = document.createElement('tbody');
      exercises.forEach(ex => {
        const trEx = document.createElement('tr');
        ['id', 'type'].forEach(col => {
          const td = document.createElement('td');
          td.textContent = ex[col] ?? '';
          trEx.appendChild(td);
        });
        tbody.appendChild(trEx);
      });
      tableExercises.appendChild(tbody);
      container.appendChild(tableExercises);
    }
  }

  // Chat funcionalidade
  const chatMessagesDiv = document.getElementById('chat-messages');
  const chatInput = document.getElementById('chat-input');

  function addMessage(sender, text) {
    const div = document.createElement('div');
    div.className = 'message ' + sender;
    div.textContent = text;
    chatMessagesDiv.appendChild(div);
    chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
  }

  async function sendMessage() {
    const text = chatInput.value.trim();
    if (!text) return;
    addMessage('user', text);
    chatInput.value = '';

    try {
      const res = await fetch(WEBHOOK_IA, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
      if (!res.ok) {
        addMessage('ia', 'Erro na resposta do agente IA.');
        return;
      }
      const data = await res.json();
      const reply = data.reply || 'Resposta vazia do agente IA.';
      addMessage('ia', reply);
    } catch (e) {
      addMessage('ia', 'Falha na comunicação com o agente IA.');
    }
  }

  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Busca e filtro no input
  const searchInput = document.getElementById('search-input');
  let searchTimeout = null;
  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      updateStudentsTable(1, searchInput.value.trim());
    }, 300);
  });

  // Inicializa dados ao carregar a página
  window.onload = () => {
    updateStudentsTable();
  };
</script>

</body>
</html>
