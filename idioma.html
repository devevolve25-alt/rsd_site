<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chat IA e Dados Supabase Hierárquico - Layout Fixo</title>
<style>
  /* Reset básico */
  body, html {
    margin: 0; padding: 0; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex; overflow: hidden; background: #f0f4f8;
    color: #333;
  }

  /* Container do chat */
  #chat-container {
    flex: 0 0 25%;
    max-width: 25%;
    min-width: 25%;
    border-right: 1px solid #d1d9e6;
    display: flex;
    flex-direction: column;
    background: #ffffff;
    box-shadow: 2px 0 8px rgba(0,0,0,0.05);
    overflow: hidden;
  }

  /* Área de mensagens */
  #chat-messages {
    flex-grow: 1;
    padding: 20px;
    overflow-y: auto;
    max-width: 100%;
    word-wrap: break-word;
    box-sizing: border-box;
    scrollbar-width: thin;
    scrollbar-color: #a0aec0 transparent;
  }
  #chat-messages::-webkit-scrollbar {
    width: 8px;
  }
  #chat-messages::-webkit-scrollbar-thumb {
    background-color: #a0aec0;
    border-radius: 4px;
  }

  /* Mensagens */
  .message {
    margin-bottom: 14px;
    max-width: 100%;
    padding: 12px 18px;
    border-radius: 20px;
    white-space: pre-wrap;
    box-shadow: 0 2px 6px rgba(0,0,0,0.07);
    font-size: 15px;
    line-height: 1.4;
    word-wrap: break-word;
    word-break: break-word;
    box-sizing: border-box;
    transition: background-color 0.3s ease;
  }
  .message.user {
    background-color: #3b82f6;
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
    text-align: right;
  }
  .message.ia {
    background-color: #e2e8f0;
    color: #2d3748;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    text-align: left;
  }

  /* Input do chat */
  #chat-input {
    width: 100%;
    box-sizing: border-box;
    border: none;
    border-top: 1px solid #d1d9e6;
    padding: 16px 20px;
    font-size: 16px;
    resize: none;
    height: 70px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #2d3748;
    background-color: #f7fafc;
    transition: background-color 0.3s ease, border-color 0.3s ease;
    max-width: 100%;
    overflow-wrap: break-word;
  }
  #chat-input:focus {
    outline: none;
    background-color: #ffffff;
    border-top: 1px solid #3b82f6;
    box-shadow: 0 -2px 4px rgba(59,130,246,0.3);
  }
  #chat-input::placeholder {
    color: #94a3b8;
    font-style: italic;
  }

  /* Container dos dados */
  #data-container {
  flex: 1 1 auto;
  max-width: 75%;
  min-width: 75%;
  padding: 30px 25px;
  overflow-y: auto;
  overflow-x: hidden; /* bloqueia scroll horizontal */
  background: #ffffff;
  box-shadow: -2px 0 8px rgba(0,0,0,0.05);
  box-sizing: border-box;
}
  #data-container::-webkit-scrollbar {
    width: 8px;
  }
  #data-container::-webkit-scrollbar-thumb {
    background-color: #a0aec0;
    border-radius: 4px;
  }

  /* Títulos */
  h2 {
    margin-top: 0;
    margin-bottom: 15px;
    font-weight: 700;
    font-size: 24px;
    color: #334155;
    border-bottom: 2px solid #3b82f6;
    padding-bottom: 5px;
    user-select: none;
  }

  h3 {
    margin-top: 20px;
    margin-bottom: 10px;
    color: #475569;
    font-weight: 600;
    font-size: 18px;
  }

  /* Tabelas */
  table {
  width: 100%;
  table-layout: fixed; /* largura fixa das colunas proporcional ao container */
  border-collapse: separate;
  border-spacing: 0 8px;
  margin-bottom: 20px;
  font-size: 15px;
  color: #334155;
  word-wrap: break-word;
  word-break: break-word;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 1px 3px rgb(0 0 0 / 0.1);
  background-color: #f8fafc;
}

th, td {
  padding: 12px 15px;
  overflow-wrap: break-word;
  word-wrap: break-word;
  word-break: break-word;
  hyphens: auto;
  white-space: normal; /* permite quebra de linha */
  border-bottom: 1px solid #e2e8f0;
}

th {
  background-color: #e0e7ff;
  font-weight: 700;
  color: #1e40af;
  text-align: left;
}

tbody tr {
  cursor: pointer;
}

tbody tr:hover {
  background-color: #dbeafe;
  box-shadow: 0 3px 6px rgba(59, 130, 246, 0.25);
  transition: background-color 0.3s ease, box-shadow 0.3s ease;
}

td.id-copyable {
  user-select: text;
  cursor: text;
  color: #1e40af;
  font-weight: 700;
}

.indent-1 td {
  padding-left: 30px;
  font-style: italic;
  background: #eef4ff;
}

.indent-2 td {
  padding-left: 50px;
  font-style: italic;
  background: #e6f0ff;
}

.indent-3 td {
  padding-left: 70px;
  font-style: italic;
  background: #dce6ff;
}

/* Estilo para linha expansível */
.expansion-row td {
  background: #f0f5ff;
  border-top: none;
  border-bottom: none;
  padding: 0;
}

.expansion-content {
  padding: 10px 15px;
  background: #f9fbff;
  box-sizing: border-box;
}

#exercise-questions-card {
  border: 2px solid #60a5fa;
  border-radius: 8px;
  background: #e0f2fe;
  padding: 15px 20px;
  margin-top: 10px;
  max-width: 600px;
  box-sizing: border-box;
}
#exercise-questions-card h4 {
  margin-top: 0;
  margin-bottom: 10px;
  color: #1e40af;
  font-weight: 700;
  font-size: 18px;
}
#exercise-questions-card ul {
  list-style-type: none;
  padding-left: 0;
  margin: 0;
}
#exercise-questions-card ul li {
  padding: 6px 0;
  border-bottom: 1px solid #bae6fd;
  color: #1e3a8a;
  font-size: 15px;
  word-break: break-word;
}
</style>
</head>
<body>

<div id="chat-container">
  <div id="chat-messages"></div>
  <textarea id="chat-input" placeholder="Digite sua mensagem (Shift+Enter para nova linha)..."></textarea>
</div>

<div id="data-container">
  <h2>student</h2>
  <div id="student-table-container" class="hierarchy-container">
    <table id="table-student" aria-label="Tabela de estudantes">
      <thead><tr><th>id</th><th>nome</th><th>level</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://htsorgukdbfuuypiuksm.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_8bpn_JEYZU2YzVMC5UK3CA_9Kn4LPdm';
  const WEBHOOK_IA = 'https://powerfulkiwi-n8n.cloudfy.live/webhook/english_page';

  const headersSupabase = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
  };

  async function fetchTable(table, columns, filter = null) {
    let url = `${SUPABASE_URL}/rest/v1/${table}?select=${columns.join(',')}`;
    if (filter) {
      url += `&${filter}`;
    }
    try {
      const res = await fetch(url, { headers: headersSupabase });
      if (!res.ok) throw new Error(`Erro ao buscar ${table}: ${res.status}`);
      return await res.json();
    } catch (e) {
      console.error(e);
      return [];
    }
  }

  function createTable(columns, data, rowClickHandler = null, indentLevel = 0) {
    const table = document.createElement('table');
    const thead = document.createElement('thead');
    const trHead = document.createElement('tr');
    columns.forEach(col => {
      const th = document.createElement('th');
      th.textContent = col;
      trHead.appendChild(th);
    });
    thead.appendChild(trHead);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    data.forEach(row => {
      const tr = document.createElement('tr');
      if (rowClickHandler) {
        tr.classList.add('clickable');
        tr.addEventListener('click', () => rowClickHandler(row, tr));
      }
      if (indentLevel > 0) {
        tr.classList.add(`indent-${indentLevel}`);
      }
      columns.forEach(col => {
        const td = document.createElement('td');
        td.textContent = row[col] ?? '';
        if (col === 'id') {
          td.classList.add('id-copyable');
          td.addEventListener('click', (e) => {
            e.stopPropagation();
            navigator.clipboard.writeText(td.textContent).then(() => {
              td.style.backgroundColor = '#dbeafe';
              setTimeout(() => td.style.backgroundColor = '', 300);
            });
          });
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    return table;
  }

  // Cria uma linha expansível logo abaixo da linha passada, com conteúdo HTML passado
  function createExpansionRow(parentTr, colspan, contentHTML) {
    // Verifica se já existe linha de expansão abaixo e remove para fechar
    const nextTr = parentTr.nextSibling;
    if (nextTr && nextTr.classList && nextTr.classList.contains('expansion-row')) {
      nextTr.remove();
      return null;
    }
    // Cria linha expansível
    const tr = document.createElement('tr');
    tr.classList.add('expansion-row');
    const td = document.createElement('td');
    td.colSpan = colspan;
    td.classList.add('expansion-content');
    td.innerHTML = contentHTML;
    tr.appendChild(td);
    // Insere após linha pai
    parentTr.parentNode.insertBefore(tr, parentTr.nextSibling);
    return tr;
  }

  // Função para carregar e mostrar class_plans dentro linha expansível
  async function toggleClassPlans(studentRow, studentId) {
    const colspan = studentRow.cells.length;
    // Se linha expansão já aberta, fecha
    const nextTr = studentRow.nextSibling;
    if (nextTr && nextTr.classList && nextTr.classList.contains('expansion-row')) {
      nextTr.remove();
      return;
    }
    // Busca class_plans
    const classPlans = await fetchTable('class_plan', ['id', 'description'], `id_student=eq.${studentId}`);
    if (classPlans.length === 0) {
      createExpansionRow(studentRow, colspan, '<p>Nenhum class_plan encontrado para este estudante.</p>');
      return;
    }
    // Cria tabela class_plan
    const cpTable = createTable(['id', 'description'], classPlans, (cpRow, cpTr) => {
      toggleClasses(cpTr, cpRow.id);
    }, 1);
    // Insere tabela em div para estilo
    const contentDiv = document.createElement('div');
    contentDiv.style.padding = '10px 0';
    contentDiv.appendChild(cpTable);
    createExpansionRow(studentRow, colspan, contentDiv.outerHTML);
    // Após inserção, adicionar evento para as linhas da tabela criada pois foi clonada como html
    const insertedTr = studentRow.nextSibling;
    const insertedTable = insertedTr.querySelector('table');
    if(insertedTable){
      Array.from(insertedTable.tBodies[0].rows).forEach((tr,rowIndex)=>{
        tr.addEventListener('click',()=>{
          toggleClasses(tr, classPlans[rowIndex].id);
        });
      });
    }
  }

  // Função para carregar e mostrar classes dentro linha expansível
  async function toggleClasses(classPlanRow, classPlanId) {
    const colspan = classPlanRow.cells.length;
    const nextTr = classPlanRow.nextSibling;
    if (nextTr && nextTr.classList && nextTr.classList.contains('expansion-row')) {
      nextTr.remove();
      return;
    }
    // Busca classes
    const classes = await fetchTable('classes', ['id', 'type', 'title', 'description'], `id_class_plan=eq.${classPlanId}`);
    if (classes.length === 0) {
      createExpansionRow(classPlanRow, colspan, '<p>Nenhuma classe encontrada para este class_plan.</p>');
      return;
    }
    // Cria tabela classes
    const classesTable = createTable(['id', 'type', 'title', 'description'], classes, (classRow, classTr) => {
      toggleExercises(classTr, classRow.id);
    }, 2);
    const contentDiv = document.createElement('div');
    contentDiv.style.padding = '10px 0';
    contentDiv.appendChild(classesTable);
    createExpansionRow(classPlanRow, colspan, contentDiv.outerHTML);
    // Evento para linhas inseridas (clone HTML)
    const insertedTr = classPlanRow.nextSibling;
    const insertedTable = insertedTr.querySelector('table');
    if(insertedTable){
      Array.from(insertedTable.tBodies[0].rows).forEach((tr,rowIndex)=>{
        tr.addEventListener('click',()=>{
          toggleExercises(tr, classes[rowIndex].id);
        });
      });
    }
  }

  // Função para carregar e mostrar exercises dentro linha expansível
  async function toggleExercises(classRow, classId) {
    const colspan = classRow.cells.length;
    const nextTr = classRow.nextSibling;
    if (nextTr && nextTr.classList && nextTr.classList.contains('expansion-row')) {
      nextTr.remove();
      return;
    }
    // Busca exercises
    const exercises = await fetchTable('exercises', ['id', 'type', 'question_1', 'question_2', 'question_3', 'question_4', 'question_5', 'question_6', 'question_7', 'question_8', 'question_9', 'question_10'], `id_class=eq.${classId}`);
    if (exercises.length === 0) {
      createExpansionRow(classRow, colspan, '<p>Nenhum exercício encontrado para esta classe.</p>');
      return;
    }
    // Cria tabela exercises
    const exercisesTable = createTable(['id', 'type'], exercises, (exerciseRow) => {
      showExerciseQuestionsCard(exerciseRow);
    }, 3);

    const contentDiv = document.createElement('div');
    contentDiv.style.padding = '10px 0';
    contentDiv.appendChild(exercisesTable);
    createExpansionRow(classRow, colspan, contentDiv.outerHTML);
    // Evento para linhas inseridas (clone HTML)
    const insertedTr = classRow.nextSibling;
    const insertedTable = insertedTr.querySelector('table');
    if(insertedTable){
      Array.from(insertedTable.tBodies[0].rows).forEach((tr,rowIndex)=>{
        tr.addEventListener('click',()=>{
          showExerciseQuestionsCard(exercises[rowIndex]);
        });
      });
    }
  }

  // Exibição do card com perguntas do exercício
  function showExerciseQuestionsCard(exercise) {
    removeExerciseQuestionsCard();
    const container = document.createElement('div');
    container.id = 'exercise-questions-card';
    container.style.margin = '10px 0 10px 70px'; // indent maior para exercícios

    const h4 = document.createElement('h4');
    h4.textContent = `Perguntas do exercício ID: ${exercise.id}`;
    container.appendChild(h4);

    const ul = document.createElement('ul');
    for (let i = 1; i <= 10; i++) {
      const q = exercise[`question_${i}`];
      if(q && q.trim() !== '') {
        const li = document.createElement('li');
        li.textContent = `${i}. ${q}`;
        ul.appendChild(li);
      }
    }
    container.appendChild(ul);

    // Inserir o card abaixo da linha da tabela de exercises (última linha de exercises expansion)
    // Procurar a linha 'expansion-row' logo depois da última linha clicada
    // Como a tabela de exercises está dentro de linha expansão de classes, que está dentro de linha expansão de class_plan, que está dentro de linha expansão de aluno,
    // vamos inserir logo após a linha de exercises expansion, no tbody da tabela de exercises.

    // Para facilitar, vamos procurar última linha expansion que contenha tabela exercises e inserir após ela
    const exercisesContainer = document.getElementById('data-container');
    removeExerciseQuestionsCard();
    exercisesContainer.appendChild(container);
  }

  function removeExerciseQuestionsCard() {
    const old = document.getElementById('exercise-questions-card');
    if(old) old.remove();
  }

  // Funções chat e envio mensagem
  const chatMessagesDiv = document.getElementById('chat-messages');
  const chatInput = document.getElementById('chat-input');

  function addMessage(sender, text) {
    const div = document.createElement('div');
    div.className = 'message ' + sender;
    div.textContent = text;
    chatMessagesDiv.appendChild(div);
    chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
  }

  async function sendMessage() {
    const text = chatInput.value.trim();
    if (!text) return;
    addMessage('user', text);
    chatInput.value = '';

    try {
      const res = await fetch(WEBHOOK_IA, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
      if (!res.ok) {
        addMessage('ia', 'Erro na resposta do agente IA.');
        return;
      }
      const data = await res.json();
      const output = data.output || 'Resposta vazia do agente IA.';
      addMessage('ia', output);
    } catch (e) {
      addMessage('ia', 'Falha na comunicação com o agente IA.');
    }
  }

  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  window.onload = loadStudents;
</script>

</body>
</html>
